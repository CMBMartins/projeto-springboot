<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Gestão de Mídias - Shows e Filmes</title>

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>

    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>

</head>

<style>
    body {        
        font-family: Arial;
        margin: 0;
        background: #f2f2f2;        
    }

    /* BARRA SUPERIOR */

    .topo {
        background: #2c3e50;
        color: white;
        padding: 15px;
        text-align: center;
        font-size: 24px;
    }

    /* CONTAINER */

    .container {
        width: 900px;
        margin: auto;
        margin-top: 20px;
    }

    /* CARD */

    .card {
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0px 0px 8px gray;
        margin-bottom: 20px;
    }

    /* LOGO */

    .logo {
        text-align: center;
    }

    .campo-direita {
        text-align: right;
    }

    #usuariologado {
        text-align: right;
        float: right;
        padding: 6px 10px;
        text-align: right;
        font-weight: bold;
        font-size: 14px;
        color: #003366;
        background: #e6f2ff;
        border: 2px solid #007bff;
        border-radius: 6px;
        box-shadow: 0px 2px 4px rgba(0, 0, 0, 0.2);
    }

    /* INPUTS */

    input {
        width: 100%;
        padding: 8px;
        margin-top: 8px;
    }

    /* GRID FORM */

    .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
    }

    /* BOTÕES */

    .botoes {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 20px;
        
    }

    /* padrão de botão */
    .botoes button {
        padding: 10px 18px;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s ease;
        color: white;
    }

    /* padrão de botão */
    .login button {
        padding: 10px 18px;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s ease;
        color: white;
        background-color: #007bff;        
    }


    #salvar {
        background: #27ae60;
        color: white;
    }

    #editar {
        background: #6fae27;
        color: white;
    }

    #limparCampos {
        background: #f39c12;
        color: white;
    }

    #buscarArtista {
        background: #f37712;
        color: white;
    }

    #listarTodos {
        background: #2980b9;
        color: white;
    }

    .autenticar {
        background: #7827ae;
        color: white;
    }

    .logout {
        background: #ae2b27;
        color: white;
    }

    /* TABELA */

    table {
        width: 100%;
        border-collapse: collapse;
    }

    th,
    td {
        border: 1px solid #ddd;
        padding: 8px;
        text-align: center;
    }

    th {
        background: #34495e;
        color: white;
    }
</style>

</head>

<body>

    <div class="container">

        <div class="card">

            <div class="campo-direita">
                <input type="text" id="usuariologado" placeholder="Default" style="width:33%;">
            </div>

            <a href="PaginaPessoal.html" class="btn btn-default">
                <span class="glyphicon glyphicon-home"></span> Página Principal
            </a>

            <div class="logo">
                <h1><img src="Imagens/carlos1.gif" width="60">
                    Gestão de Shows e Filmes</h1>
            </div>

            <h2>Cadastrar Mídia</h2>

            <div class="grid">

                <input type="text" id="id" placeholder="ID">

                <input type="text" id="titulo" placeholder="Título">

                <input type="text" id="artista" placeholder="Artista">

                <input type="text" id="anodelançamento" placeholder="Ano de Lançamento">

                <input type="text" id="datadacompra" placeholder="Data da Compra">

                <input type="text" id="situaçao" placeholder="Situação">

                <input type="text" id="tipo" placeholder="Tipo">

                <input type="text" id="genero" placeholder="Gênero">

            </div>

            <div class="botoes">

                <button id="salvar" onclick="salvar()">Salvar</button>

                <button id="editar" onclick="editar()">Editar</button>

                <button id="limparCampos" onclick="limparCampos()">Limpar</button>

                <button id="buscarArtista" onclick="buscarArtista()">Buscar Artista</button>

                <button id="listarTodos" onclick="listarTodos()">Listar Midias</button>

            </div>

            <div class="login">

                <h2>Realizar Login</h2>

                <input type="text" id="usuario" placeholder="usuario" style="width:33%;">

                <input type="password" id="senha" placeholder="senha" style="width:33%;">

                <button onclick="autenticar()">Entrar</button>
                <button onclick="logout()">Sair</button>

            </div>

        </div>

        <div class="card">

            <h2>Lista de Shows e Filmes</h2>

            <table>

                <thead>

                    <tr>

                        <th>Código</th>
                        <th>Título</th>
                        <th>Artista</th>
                        <th>Situação</th>
                        <th>Tipo</th>
                        <th>Gênero</th>
                        <th>Ação</th>

                    </tr>

                </thead>

                <tbody id="tabelaShows">

                </tbody>

            </table>

        </div>

    </div>

    <script>

        //const id = document.getElementById("id").value;

        const API = "https://projeto-springboot.onrender.com";

        //FUNÇÃO PARA INICIAR A JANELA (PAGINA)
        window.onload = function () {
        localStorage.removeItem("usuario");
        localStorage.removeItem("loggedIn");
        };

        function iniciarSistema() {
            console.log("Sistema iniciado");            
        }

        //FUNÇÃO PARA INICIAR USUARIO
        function getUsuario() {
            
        const user = localStorage.getItem("usuario");

        if (!user || user === "undefined" || user === "null") {

        return null;
        }

        return user;
        }

        //FUNÇÃO PARA FECH SEGURO
        function fetchSeguro(url) {
            return fetch(url)
                .then(res => {
                    if (!res.ok) {
                        throw new Error("Erro na API");
                    }
                    return res.json();
                });
        }


    function listarTodos() {

    const usuario = getUsuario();

            if (!usuario) {
                console.warn("Usuário não definido!");
                alert("⚠️ Faça Login!");
                return;
            }

     fetchSeguro(`${API}/shows/usuario?usuario=${encodeURIComponent(usuario)}`)
        
        .then(data => {
            console.log(data);       

        const tabela = document.getElementById("tabelaShows");
        tabela.innerHTML = "";

        data.forEach(show => {
            tabela.innerHTML += `
                <tr>
                    <td>${show.codigo}</td>
                    <td>${show.titulo}</td>
                    <td>${show.artista}</td>
                    <td>${show.situacao}</td>
                    <td>${show.tipo}</td>
                    <td>${show.genero}</td>
                    <td>
                        <button class="btn btn-danger btn-sm"
                            onclick="editar(${show.id})">
                            Editar
                        </button>
                    </td>
                </tr>
            `;
        });
    })
    .catch(error => {
        console.error("Erro:", error);
        alert("❌ Erro ao carregar dados");
    });
    }

            // FUNÇÃO PARA SALVAR
            function salvar() {

            const usuario = getUsuario();

            if (!usuario) {
                console.warn("Usuário não definido!");
                alert("⚠️ Faça Login!");
                return;
            }

            if (confirm("Tem certeza que deseja salvar esses dados?")) {

                const codigo = document.getElementById("codigo").value;
                const titulo = document.getElementById("titulo").value;
                const artista = document.getElementById("artista").value;
                const anodelancamento = document.getElementById("anodelançamento").value;
                const datadacompra = document.getElementById("datadacompra").value;
                const situacao = document.getElementById("situaçao").value;
                const tipo = document.getElementById("tipo").value;
                const genero = document.getElementById("genero").value;

                fetch(api, {

                    method: "POST",

                    headers: {
                        "Content-Type": "application/json"
                    },

                    body: JSON.stringify({

                        titulo,
                        artista,
                        anodelancamento,
                        datadacompra,
                        situacao,
                        tipo,
                        genero

                    })

                })

                    .then(response => response.json())

                    .then(data => {

                        limparCampos();

                        carregar();

                        alert("Dados salvo com sucesso!");

                    });

                if (!localStorage.getItem("usuariologado")) {
                    alert("Faça login para executar essa ação!");
                    return;
                }

            }
        }

        // FUNÇÃO PARA EDITAR
        function editar() {

            const usuario = getUsuario();

            if (!usuario) {
                console.warn("Usuário não definido!");
                alert("⚠️ Faça Login!");
                return;
            }

            if (confirm("Tem certeza que deseja editar estes dados?")) {

                const id = document.getElementById("id").value;

                const dados = {

                    titulo: document.getElementById("titulo").value,
                    artista: document.getElementById("artista").value,
                    anodelancamento: document.getElementById("anodelancamento").value,
                    datadacompra: document.getElementById("datadacompra").value,
                    situacao: document.getElementById("situacao").value,
                    tipo: document.getElementById("tipo").value,
                    genero: document.getElementById("genero").value

                };

                fetch(api + "/" + id, {

                    method: "PUT",

                    headers: {
                        "Content-Type": "application/json"
                    },

                    body: JSON.stringify(dados)

                })

                    .then(() => {

                        alert("Dados atualizados com sucesso!");

                        limparCampos();
                        listarTodos();

                    });

            }
        }


        // FUNÇÃO PARA EXCLUIR
        function deletar(id) {

            const usuario = getUsuario();

            if (!usuario) {
                console.warn("Usuário não definido!");
                alert("⚠️ Faça Login!");
                return;
            }

            if (confirm("Tem certeza que deseja excluir este registro?")) {

                fetch(`${api}/${id}`, {
                    method: "DELETE"
                })
                    .then(() => {
                        alert("Registro excluído com sucesso!");
                        listarTodos();
                    })
                    .catch(error => {
                        console.error("Erro ao excluir:", error);
                        alert("Erro ao excluir o registro.");
                    });

            }

        }


        // FUNÇÃO PARA CONSULTAR POR ARTISTA
        function buscarArtista() {

            const artista = document.getElementById("artista").value;

            if (artista === "") {
                alert("⚠️ Informe o artista a ser consultado!");
                return;
            }

            fetch(`${api}/buscar?artista=${artista}`)

                .then(response => response.json())

                .then(data => {

                    const tabela = document.getElementById("tabelaShows");

                    tabela.innerHTML = "";

                    if (data.length === 0) {

                        tabela.innerHTML = `
        <tr>
        <td colspan="7">Nenhum resultado encontrado</td>
        </tr>
        `;

                        return;
                    }

                    data.forEach(show => {

                        tabela.innerHTML += `
        <tr>
        <td>${show.id}</td>
        <td>${show.titulo}</td>
        <td>${show.artista}</td>
        <td>${show.datadacompra}</td>
        <td>${show.tipo}</td>
        <td>${show.genero}</td>

        <td>
        <button class="btn btn-danger btn-sm"
        onclick="deletar(${show.id})">
        Excluir
        </button>
        </td>
        </tr>
        `;
                    });
                });

        }


        // FUNÇÃO PARA AUTENTICAR O USUARIO NO BANCO E MOSTRAR NA TELA
        function autenticar() {

            const usuario = document.getElementById("usuario").value;
            const senha = document.getElementById("senha").value;

            // Validação de campos vazios
            if (usuario === "" && senha === "") {
                alert("⚠️ Informe usuario e senha para realizar Login!");
                return;
            }

            if (usuario === "") {
                alert("⚠️ Informe o usuário!");
                return;
            }

            if (senha === "") {
                alert("⚠️ Informe a senha!");
                return;
            }

            fetch("https://projeto-springboot.onrender.com/usuario/login", {

                method: "POST",

                headers: {
                    "Content-Type": "application/json"
                },

                body: JSON.stringify({
                    usuario,
                    senha
                })

            })

                .then(response => {

                    if (!response.ok) {
                        throw new Error("Login inválido");
                    }

                    return response.json();

                })

                .then(data => {

                    // Mostra o usuário no campo Default
                    localStorage.setItem("usuario", data.usuario);                    
                    document.getElementById("usuariologado").value = data.usuario;
                    alert("Login realizado com sucesso!");
                    //liberarFuncoes();
                    limparLogin();

                })


                .catch(error => {

                    alert("Usuário ou senha incorretos");

                });

        }


       // FUNÇÃO EFETUAR O LOGOUT
        function logout() {
            localStorage.setItem("usuario", data.usuario);
            document.getElementById("usuariologado").value = data.usuario;
            alert("Logout realizado com sucesso!");
            iniciarSistema();
            window.location.href = "GestãodeDespesas.html";
        }

        // FUNÇÃO LIMPAR OS CAMPOS DO FORMULÁRIO
        function limparCampos() {
            document.getElementById("titulo").value = "";
            document.getElementById("artista").value = "";
            document.getElementById("anodelançamento").value = "";
            document.getElementById("datadacompra").value = "";
            document.getElementById("situaçao").value = "";
            document.getElementById("tipo").value = "";
            document.getElementById("genero").value = "";
            alert("Campos limpos sucesso!");

        }

        // FUNÇÃO PARA LIMPAR OS CAMPOS DO LOGIN
        function limparLogin() {
            document.getElementById("usuario").value = "";
            document.getElementById("senha").value = "";

        }

    </script>

</body>

</html>
