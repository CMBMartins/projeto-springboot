<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Menu das Manobras</title>
    <link rel="stylesheet" href="style.css">
    <!-- Adiciona o Bootstrap -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <!-- Adiciona o jQuery -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
    <!-- Adiciona o JavaScript do Bootstrap -->
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>

    <link rel="shortcut icon" href="icons/favicon.png" type="image/x-icon" />
    <link rel="stylesheet" href="styles/reset.css" />
    <link rel="stylesheet" href="styles/vars.css" />
    <link rel="stylesheet" href="styles/main-content.css" />
    <link rel="stylesheet" href="styles/sidebar-footer.css" />
    <link rel="stylesheet" href="styles/media-query.css" />
    <!--Media queries devem ser chamados depois do CSS principal -->

    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/solid.css"
        integrity="sha384-Tv5i09RULyHKMwX0E8wJUqSOaXlyu3SQxORObAI08iUwIalMmN5L6AvlPX2LMoSE" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/fontawesome.css"
        integrity="sha384-jLKHWM3JRmfMU0A5x5AkjWkw/EYfGUAGagvnfryNV3F9VqM98XiIH7VBGVoxVSc7" crossorigin="anonymous" />

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #d9d9d9;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .janela {
            width: 650px;
            background: #f5f5f5;
            border-radius: 8px;
            box-shadow: 3px 3px 10px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .titulo-barra {
            background: #ececec;
            padding: 8px 15px;
            font-size: 14px;
            border-bottom: 1px solid #c0c0c0;
        }

        .telaprincipal {
            display: flex;
            margin-left: 20px;
            margin-top: 0px;
        }

        .cabecalho {
            display: flex;
            align-items: left;
            justify-content: left;
            margin-top: 20px;
            margin-left: 60px;
        }

        .icone {
            width: 85px;
            margin-right: 15px;
            width: 120px;
            height: auto;
        }

        .cabecalho h1 {
            color: blue;
            font-size: 28px;
            margin: 0;
        }

        h2 {
            text-align: center;
            margin-top: 25px;
            margin-bottom: 25px;
            font-size: 20px;
        }

        .grid-botoes {
            display: grid;
            grid-template-columns: 1fr 1fr;
            margin: 20px;
            border: 1px solid #7f8fa6;
        }

        .grid-botoes button {

            height: 70px;
            font-size: 18px;
            cursor: pointer;

            border: 1px solid #7f8fa6;

            background: linear-gradient(to bottom,
                    #f4f4f4,
                    #d7e3f4);

            transition: 0.3s;
        }

        .grid-botoes button:hover {
            background: linear-gradient(to bottom,
                    #dbe9ff,
                    #b9d0f0);
        }
    </style>

</head>

<body>

    <div class="janela">

        <div class="titulo-barra">
            Menu das Manobras
        </div>

        <div class="telaprincipal">
            <a href="">
                <span class="fa fa-home"></span>
                <a href="SimuladorAlbras.html">
                    <span>Tela Principal</span>
                </a>
        </div>

        <div class="cabecalho">
            <img src="imagensAlbras/ALBRAS1.JPG" alt="Torre" class="icone">
            <h1>Menu das Manobras</h1>
        </div>

        <h2>Habilitar Classes de Manobras</h2>

        <div class="grid-botoes">

            <button onclick="abrirEletroNorte()">
                Manobras da ELETRONORTE
            </button>

            <button onclick="abrir230KV()">
                Manobras de 230 kV
            </button>

            <button onclick="abrirReducao()">
                Manobras da Redução
            </button>

            <button onclick="abrirTransferencia()">
                Manobras de Transferência
            </button>

            <button onclick="abrirGeradores()">
                Manobras Geradores
            </button>

            <button onclick="fecharTela()">
                Sair
            </button>

        </div>

    </div>

    <script src="script.js"></script>

    <script>
        function abrirEletroNorte() {
            window.open("MenudasManobrasEletronorte.html");
        }

        function abrir230KV() {
            window.open("MenudeManobras230KV.html");
        }

        function abrirReducao() {
            alert("Abrindo Manobras da Redução...");
            // window.open("reducao.html");
        }

        function abrirTransferencia() {
            alert("Abrindo Manobras de Transferência...");
            // window.open("transferencia.html");
        }

        function abrirGeradores() {
            alert("Abrindo Manobras Geradores...");
            // window.open("geradores.html");
        }

        function fecharTela() {
            window.close();
        }
    </script>

</body>

</html>
