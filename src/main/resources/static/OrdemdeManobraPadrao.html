<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Ordem de Manobra Padrão</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #dcdcdc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .janela {
            width: 800px;
            background: #f2f2f2;
            border: 2px solid #999;
            padding: 20px;
            box-shadow: 4px 4px 10px rgba(0, 0, 0, .3);
        }

        .titulo {
            text-align: center;
            color: blue;
            font-size: 38px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .subtitulo {
            text-align: center;
            color: red;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 30px;
        }

        .lista-manobras {
            display: none;
            grid-template-columns: 1fr 1fr;
            gap: 8px 40px;
            margin-bottom: 30px;
        }

        .item {
            font-size: 18px;
            font-style: italic;
            color: #222;
        }

        .botoes {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .botoes button {
            width: 130px;
            height: 40px;
            border: 1px solid #666;
            background: #c0c0ff;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
        }

        .botoes button:hover {
            background: #9fa8ff;
        }
    </style>
</head>

<body>

    <div class="janela">

        <div class="titulo">
            Manobra Padrão!
        </div>

        <div class="subtitulo" id="nomeManobra">
            Nenhuma Manobra Habilitada
        </div>

        <div class="lista-manobras" id="listaManobras">
        </div>

        <div class="botoes">
            <button onclick="visualizar()">Visualizar</button>
            <button onclick="limpar()">Limpar</button>
            <button onclick="window.close()">Sair</button>
        </div>

    </div>

    <script>

        function visualizar() {
            carregarManobra();
        }


        function limpar() {

            document.getElementById("nomeManobra").innerHTML =
                "Nenhuma Manobra Habilitada";

            document.getElementById("listaManobras").innerHTML = "";

            document.getElementById("listaManobras").style.display =
                "none";

            localStorage.removeItem(
                "manobraAtual"
            );
        }


        function carregarManobra() {

            console.log("manobraAtual:",
                localStorage.getItem("manobraAtual"));

            console.log("passosExecutados:",
                localStorage.getItem("passosExecutados"));

            let codigo =
                localStorage.getItem(
                    "manobraAtual"
                );

            if (!codigo) {
                return;
            }

            let manobra =
                manobras[codigo];

            if (!manobra) {
                return;
            }

            document.getElementById(
                "nomeManobra"
            ).innerHTML = manobra.titulo;

            let lista =
                document.getElementById(
                    "listaManobras"
                );

            lista.innerHTML = "";

            manobra.passos.forEach(
                (passo, indice) => {

                    lista.innerHTML +=
                        `<div class="item">
                    ${indice + 1}. ${passo}
                </div>`;

                }
            );

            lista.style.display = "grid";
        }


        const manobras = {

            EnergizarLinha1: {

                titulo: "OM para Energizar Linha 1",

                passos: [
                    "Fechar Seccionadora 89L1",
                    "Fechar Seccionadora 89L1A",
                    "Fechar Disjuntor 52L1"
                ]
            },

            DesenergizarLinha1: {

                titulo: "OM para Desenergizar Linha 1",

                passos: [
                    "Abrir Disjuntor 52L1",
                    "Abrir Seccionadora 89L1A",
                    "Abrir Seccionadora 89L1"
                ]
            },

            EnergizarLinha2: {

                titulo: "OM para Energizar Linha 2",

                passos: [
                    "Fechar Seccionadora 89L2",
                    "Fechar Seccionadora 89L2B",
                    "Fechar Disjuntor 52L2"
                ]
            },

            DesenergizarLinha2: {

                titulo: "OM para Desenergizar Linha 2",

                passos: [
                    "Abrir Disjuntor 52L2",
                    "Abrir Seccionadora 89L2B",
                    "Abrir Seccionadora 89L2"
                ]
            },

            EnergizarLinha1BarraA: {

                passos: [
                    "Fechar Seccionadora 89L1",
                    "Fechar Seccionadora 89L1A",
                    "Fechar Disjuntor 52L1",
                    "Fechar Seccionadora 89MT1A",
                    "Fechar Disjuntor 52MT1"
                ]
            },

            DesenergizarLinha1BarraA: {

                passos: [
                    "Abrir Disjuntor 52MT1",
                    "Abrir Seccionadora 89MT1A",
                    "Abrir Disjuntor 52L1",

                ]
            },

                    "Abrir Seccionadora 89AL"
                ]
            },

            EnergizarAlbras: {

                titulo: "OM para Energizar a SE Albras",

                passos: [
                    "Disjuntor 52L1 Fechado",
                    "Disjuntor 52L2 Fechado",
                    "Disjuntor 52BT Fechado",
                    "Disjuntor 52AL fechado",
                    "Disjuntor 52MT1 Fechado",
                    "Disjuntor 52MTR Fechado",
                    "Disjuntor 52MT2 Fechado",
                    "Disjuntor 52MT3 Fechado",
                    "Disjuntor 52MT4 Fechado",
                    "Disjuntor 52A1 Fechado",
                    "Disjuntor 52A2 Fechado",
                    "Disjuntor 52A3 Fechado",
                    "Disjuntor 52A4 Fechado",
                    "Disjuntor 52A5 Fechado",
                    "Disjuntor 52A6 Fechado",
                    "Disjuntor 52A7 Fechado",
                    "Disjuntor 52A8 Fechado",
                    "Disjuntor 52P1 Fechado",
                    "Disjuntor 52P2 Fechado",
                    "Disjuntor 52P3 Fechado",
                    "Disjuntor 52P4 Fechado",
                    "Disjuntor 52P5 Fechado",
                    "Disjuntor 52P6 Fechado"
                ]
            },

            DesenergizarAlbras: {

                titulo: "OM para Desenergizar a SE Albras",

                passos: [
                    "Disjuntor 52L1 Fechado",
                    "Disjuntor 52L2 Fechado",
                    "Disjuntor 52BT Fechado",
                    "Disjuntor 52AL fechado",
                    "Disjuntor 52MT1 Fechado",
                    "Disjuntor 52MTR Fechado",
                    "Disjuntor 52MT2 Fechado",
                    "Disjuntor 52MT3 Fechado",
                    "Disjuntor 52MT4 Fechado",
                    "Disjuntor 52A1 Fechado",
                    "Disjuntor 52A2 Fechado",
                    "Disjuntor 52A3 Fechado",
                    "Disjuntor 52A4 Fechado",
                    "Disjuntor 52A5 Fechado",
                    "Disjuntor 52A6 Fechado",
                    "Disjuntor 52A7 Fechado",
                    "Disjuntor 52A8 Fechado",
                    "Disjuntor 52P1 Fechado",
                    "Disjuntor 52P2 Fechado",
                    "Disjuntor 52P3 Fechado",
                    "Disjuntor 52P4 Fechado",
                    "Disjuntor 52P5 Fechado",
                    "Disjuntor 52P6 Fechado"
                ]
            },

        };

        window.onload = function () {
            carregarManobra();
            setInterval(carregarManobra, 1000);
        };

    </script>

</body>

</html>
