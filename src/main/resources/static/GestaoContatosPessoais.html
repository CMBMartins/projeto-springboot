<body>
    <div class="topo">

        <img src="Imagens/Carlos1.gif" width="50">
        Gestão de Contatos Pessoais
    </div>

    <a href="PaginaPessoal.html" class="btn btn-default">
        <span class="glyphicon glyphicon-home"></span> Página Principal
    </a>

    <div class="container">

        <div class="card">

            <div class="logo">
                <img src="Imagens/Carlos.png" width="250">
            </div>

            <h1 class="text-center">Cadastrar Contatos Pessoais</h1>

            <form id="formulario" action="GestaoContatosPessoais.php" method="post">

                <label>Código</label>
                <input type="text" class="form-control" name="codigo">

                <label>Nome</label>
                <input type="text" class="form-control" name="nome">

                <label>Telefone</label>
                <input type="text" class="form-control" name="telefone">

                <label>Endereço</label>
                <input type="text" class="form-control" name="endereco">

                <div class="botoes">

                    <button class="btn btn-primary" type="submit" name="inserir">
                        Inserir
                    </button>

                    <button class="btn btn-warning" type="submit" name="atualizar">
                        Atualizar
                    </button>

                    <button class="btn btn-danger" type="submit" name="apagar" onclick="return confirmarExclusao()">
                        Excluir
                    </button>

                    <button class="btn btn-info" type="submit" name="consultaporcodigo">
                        Consultar Código
                    </button>

                    <button class="btn btn-info" type="submit" name="consultapornome">
                        Consultar Nome
                    </button>

                    <button class="btn btn-success" type="submit" name="consultaTabela">
                        Consultar Todos
                    </button>

                    <button class="btn btn-default" type="button" onclick="limparFormulario()">
                        Limpar
                    </button>

                </div>

            </form>
            <script src="scripts/formulario.js">
                function confirmarExclusao() {
                    return confirm("Deseja realmente excluir este contato?");
                }

                function limparFormulario() {
                    document.getElementById("formulario").reset();
                }

                function mensagem(texto) {
                    alert(texto);
                }
            </script>
        </div>

</body>
