    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #d9d9d9;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .janela {
            width: 650px;
            background: #f5f5f5;
            border-radius: 8px;
            box-shadow: 3px 3px 10px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .titulo-barra {
            background: #ececec;
            padding: 8px 15px;
            font-size: 14px;
            border-bottom: 1px solid #c0c0c0;
        }

        .telaprincipal {
            display: flex;
            margin-left: 20px;
            margin-top: 0px;
        }

        .cabecalho {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 20px;
        }

        .icone {
            width: 55px;
            margin-right: 15px;
            width: 120px;
            height: auto;
        }

        .cabecalho h1 {
            color: blue;
            font-size: 28px;
            margin: 0;
        }

        h2 {
            text-align: center;
            margin-top: 25px;
            margin-bottom: 25px;
            font-size: 20px;
        }

        .grid-botoes {
            display: grid;
            grid-template-columns: 1fr 1fr;
            margin: 20px;
            border: 1px solid #7f8fa6;
        }

        .grid-botoes1 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            margin: 20px;
            border: 1px solid #7f8fa6;
        }

        .grid-botoes button {
            height: 70px;
            font-size: 18px;
            cursor: pointer;
            border: 1px solid #7f8fa6;
            background: linear-gradient(to bottom,
                    #f4f4f4,
                    #d7e3f4);
            transition: 0.3s;
        }

        .grid-botoes1 button {
            height: 40px;
            font-size: 18px;
            cursor: pointer;
            border: 1px solid #7f8fa6;
            background: linear-gradient(to bottom,
                    #f4f4f4,
                    #d7e3f4);
            transition: 0.3s;
        }

        .grid-botoes button:hover {
            background: linear-gradient(to bottom,
                    #dbe9ff,
                    #b9d0f0);
        }

        .grid-botoes1 button:hover {
            background: linear-gradient(to bottom,
                    #dbe9ff,
                    #b9d0f0);
        }
    </style>
