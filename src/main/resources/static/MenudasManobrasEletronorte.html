<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Menu das Manobras da Eletronorte</title>
    <link rel="stylesheet" href="style.css">
    <!-- Adiciona o Bootstrap -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <!-- Adiciona o jQuery -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
    <!-- Adiciona o JavaScript do Bootstrap -->
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>

    <link rel="shortcut icon" href="icons/favicon.png" type="image/x-icon" />
    <link rel="stylesheet" href="styles/reset.css" />
    <link rel="stylesheet" href="styles/vars.css" />
    <link rel="stylesheet" href="styles/main-content.css" />
    <link rel="stylesheet" href="styles/sidebar-footer.css" />
    <link rel="stylesheet" href="styles/media-query.css" />
    <!--Media queries devem ser chamados depois do CSS principal -->

    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/solid.css"
        integrity="sha384-Tv5i09RULyHKMwX0E8wJUqSOaXlyu3SQxORObAI08iUwIalMmN5L6AvlPX2LMoSE" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/fontawesome.css"
        integrity="sha384-jLKHWM3JRmfMU0A5x5AkjWkw/EYfGUAGagvnfryNV3F9VqM98XiIH7VBGVoxVSc7" crossorigin="anonymous" />

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #d9d9d9;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .janela {
            width: 650px;
            background: #f5f5f5;
            border-radius: 8px;
            box-shadow: 3px 3px 10px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .titulo-barra {
            background: #ececec;
            padding: 8px 15px;
            font-size: 14px;
            border-bottom: 1px solid #c0c0c0;
        }

        .telaprincipal {
            display: flex;
            margin-left: 20px;
            margin-top: 0px;
        }

        .cabecalho {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 20px;
        }

        .icone {
            width: 55px;
            margin-right: 15px;
            width: 120px;
            height: auto;
        }

        .cabecalho h1 {
            color: blue;
            font-size: 28px;
            margin: 0;
        }

        h2 {
            text-align: center;
            margin-top: 25px;
            margin-bottom: 25px;
            font-size: 20px;
        }

        .grid-botoes {
            display: grid;
            grid-template-columns: 1fr 1fr;
            margin: 20px;
            border: 1px solid #7f8fa6;
        }

        .grid-botoes1 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            margin: 20px;
            border: 1px solid #7f8fa6;
        }

        .grid-botoes button {
            height: 70px;
            font-size: 18px;
            cursor: pointer;
            border: 1px solid #7f8fa6;
            background: linear-gradient(to bottom,
                    #f4f4f4,
                    #d7e3f4);
            transition: 0.3s;
        }

        .grid-botoes1 button {
            height: 40px;
            font-size: 18px;
            cursor: pointer;
            border: 1px solid #7f8fa6;
            background: linear-gradient(to bottom,
                    #f4f4f4,
                    #d7e3f4);
            transition: 0.3s;
        }

        .grid-botoes button:hover {
            background: linear-gradient(to bottom,
                    #dbe9ff,
                    #b9d0f0);
        }

        .grid-botoes1 button:hover {
            background: linear-gradient(to bottom,
                    #dbe9ff,
                    #b9d0f0);
        }
    </style>

</head>

<body>

    <div class="janela">

        <div class="titulo-barra">
            Menu das Manobras da Eletronorte
        </div>

        <div class="telaprincipal">
            <a href="SimuladorAlbras.html">
                <span class="fa fa-home"></span>
                <span>Tela Principal</span>
            </a>
        </div>

        <div class="cabecalho">
            <img src="imagensAlbras/ALBRAS1.JPG" alt="Torre" class="icone">
            <h1>Menu das Manobras da Eletronorte</h1>
        </div>

        <h2>Habilitar Classes de Manobras</h2>

        <div class="grid-botoes">

            <button onclick="desenerAlbras()">
                Desenergizar SE ALBRAS
            </button>

            <button onclick="enerAlbras()">
                Energizar SE ALBRAS
            </button>

            <button onclick="PrepAlbras()">
                Preparação da SE ALBRAS
            </button>

            <button onclick="enerGerador()">
                Energizar os Geradores
            </button>

            <button onclick="desenerGeradores()">
                Desenergizar os Geradores
            </button>

        </div>

        <div class="grid-botoes1">

            <button onclick="manobraExecutada()">
                Manobra Executada
            </button>

            <button onclick="manobraPadrao()">
                Manobra Padrão
            </button>

            <button onclick="fecharTela()">
                Sair
            </button>

        </div>

    </div>

    <script src="script.js"></script>

    <script>
        function desenerAlbras() {
            localStorage.setItem(
                "manobraAtual",
                "DesenergizarAlbras"
            );

            localStorage.setItem(
                "desenerAlbrasHabilitada",
                "true"
            );

            localStorage.setItem(
                "passosExecutados",
                JSON.stringify([])
            );

            alert(
                "Manobra Desenergizar a SE Albras habilitada."
            );
        }

        function enerAlbras() {
            localStorage.setItem(
                "manobraAtual",
                "EnergizarAlbras"
            );

            localStorage.setItem(
                "enerAlbrasHabilitada",
                "true"
            );

            localStorage.setItem(
                "passosExecutados",
                JSON.stringify([])
            );

            alert(
                "Manobra Energizar a SE Albras habilitada."
            );
        }

        function PrepAlbras() {
            localStorage.setItem(
                "manobraAtual",
                "PrepAlbras"
            );

            localStorage.setItem(
                "prepAlbrasHabilitada",
                "true"
            );

            localStorage.setItem(
                "passosExecutados",
                JSON.stringify([])
            );

            alert(
                "Manobra para Preparar a SE ALBRAS habilitada."
            );
        }

        function enerGerador() {
            localStorage.setItem(
                "manobraAtual",
                "EnergizarGeradores"
            );

            localStorage.setItem(
                "enerGeradoresHabilitada",
                "true"
            );

            localStorage.setItem(
                "passosExecutados",
                JSON.stringify([])
            );

            alert(
                "Manobra Energizar os Geradores habilitada."
            );
        }

        function desenerGeradores() {
            localStorage.setItem(
                "manobraAtual",
                "DesenergizarGeradores"
            );

            localStorage.setItem(
                "desenerGeradoresHabilitada",
                "true"
            );

            localStorage.setItem(
                "passosExecutados",
                JSON.stringify([])
            );

            alert(
                "Manobra Desenergizar os Geradores habilitada."
            );
        }

        function fecharTela() {
            window.close();
        }

        function manobraPadrao() {
            window.open("OrdemdeManobraPadrao.html", "_blank");
        }

        function manobraExecutada() {
            window.open("OrdemdeManobraExecutada.html", "_blank");
        }

    </script>

</body>

</html>
