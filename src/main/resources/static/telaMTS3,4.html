                //SCRIPT COM AS FUNÇÕES PARA OS FEEDS BACKS DO SISTEMA//
                //FUNÇÕES PARA MOSTRAR MENSAGENS DE FEED BACK//
                function mostrarMensagemManobra(texto) {
                    let popup =
                        document.getElementById(
                            "popupManobra"
                        );

                    popup.innerHTML = texto;
                    popup.style.display =
                        "block";
                    setTimeout(function () {

                        popup.style.display =
                            "none";
                    }, 4000);
                }

                //FUNÇÕES PARA DEFINIR SELETIVIDADE DAS MENSAGENS//
                function mostrarMensagemManobra(texto, tipo = "sucesso") {

                    let popup =
                        document.getElementById("popupManobra");

                    popup.innerHTML = texto;

                    if (tipo === "sucesso") {
                        popup.style.backgroundColor = "#28a745";
                    }

                    if (tipo === "erro") {
                        popup.style.backgroundColor = "#dc3545";
                    }

                    if (tipo === "aviso") {
                        popup.style.backgroundColor = "#ffc107";
                        popup.style.color = "black";
                    }

                    popup.style.display = "block";

                    setTimeout(() => {
                        popup.style.display = "none";
                        popup.style.color = "white";
                    }, 4000);
                }

                function toggleSeccionadoraMT4A(tipo) {
                    let linha = document.querySelector(`#linha${tipo}`);

                    if (linha) {
                        // Se a linha está na posição vertical (fechada), alteramos para inclinada (aberta)
                        if (linha.getAttribute("x2") === "40") {
                            linha.setAttribute("x2", "60"); // Move para direita (linha inclinada)
                            linha.setAttribute("y2", "118");

                            seccionadora89mt4afechada = false;
                            registrarPasso(
                                "Abrir Seccionadora 89MT4A"
                            );

                        } else {
                            // Se a linha já está inclinada, voltamos para vertical (fechada)
                            linha.setAttribute("x2", "40");
                            linha.setAttribute("y2", "118");
                        }
                    } else {
                        // Criamos a linha inicial como fechada (vertical)
                        linha = document.createElementNS("http://www.w3.org/2000/svg", "line");
                        linha.setAttribute("id", "linha" + tipo);
                        linha.setAttribute("stroke", "red");
                        linha.setAttribute("stroke-width", "4");
                        linha.setAttribute("x1", "40");
                        linha.setAttribute("y1", "152");
                        linha.setAttribute("x2", "40");
                        linha.setAttribute("y2", "118");

                        document.getElementById("diagrama").appendChild(linha);

                        seccionadora89mt4afechada = true;
                        registrarPasso(
                            "Fechar Seccionadora 89MT4A"
                        );
                        console.log("89MT4A FECHADA");
                    }

                    verificarDesenerBayMT4();
                }

                //FUNÇÃO PARA GUARDAR OS PASSOS EXECUTADOS NAS MANOBRAS
                function registrarPasso(texto) {

                    let passosExecutados =
                        JSON.parse(
                            localStorage.getItem("passosExecutados")
                        ) || [];

                    if (!passosExecutados.includes(texto)) {

                        passosExecutados.push(texto);

                        localStorage.setItem(
                            "passosExecutados",
                            JSON.stringify(passosExecutados)
                        );
                    }

                    console.log(
                        "passosExecutados:",
                        passosExecutados
                    );
                }

                //FUNÇÃO PARA CONFERIR A MANOBRA DA ENERGIZAÇÃO E DESENERGIZAÇÃO DO BAY DO MT1                
                function verificarEnerBayMT3() {

                    console.log("verificarBayMT3 executou");

                    let manobraAtual =
                        localStorage.getItem("manobraAtual");

                    let enerBayMT3Habilitada =
                        localStorage.getItem("enerBayMT3Habilitada") === "true";

                    if (!enerBayMT3Habilitada ||
                        manobraAtual !== "EnergizarBayMT3") {
                        return;
                    }

                    if (
                        seccionadora89mt3afechada &&
                        disjuntor52mt3fechado
                    ) {

                        mostrarMensagemManobra(
                            "✅ Manobra Energizar Bay do MT3 concluída com sucesso!"
                        );

                        localStorage.setItem(
                            "enerBayMT3Habilitada",
                            "false"
                        );

                        localStorage.setItem(
                            "manobraAtual",
                            ""
                        );
                    }
                }
