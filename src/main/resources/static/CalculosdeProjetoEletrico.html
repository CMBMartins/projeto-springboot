<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<title>Cálculos de Projetos Elétricos</title>

<link rel="shortcut icon" href="icons/favicon.png" type="image/x-icon" />

<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">

<link rel="stylesheet" href="styles/reset.css">
<link rel="stylesheet" href="styles/vars.css">
<link rel="stylesheet" href="styles/main-content.css">
<link rel="stylesheet" href="styles/sidebar-footer.css">
<link rel="stylesheet" href="styles/media-query.css">

<link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css">

<style>

body{
background-color:#f6f6f6;
}

.topo{
text-align:center;
margin-top:20px;
}

.logo{
max-width:150px;
margin:10px auto;
display:block;
}

.home{
text-align:center;
margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<div class="home text-start">
    <a href="PaginaPessoal.html" class="btn btn-secondary">
    <i class="fa fa-home"></i> Página Principal
    </a>
</div>

<div class="topo">

<h1><img src="Imagens/Carlos.png" class="logo">
Cálculos de Potências de Luz e Tomadas</h1>

</div>

<div class="container mt-5">
	
<h1>Cálculo de Potência de Luz em VA</h1>

<label class="form-label">
Insira o tamanho do ambiente em m²
</label>

<input type="number" id="num1" class="form-control">

<br>

<button onclick="calcularLuz()" class="btn btn-primary">
Calcular Potência de Luz
</button>

<h2 id="resultado1"></h2>

</div>

<script>

function calcularLuz(){

let num1 = parseFloat(document.getElementById("num1").value);

let resultado = 100 + ((num1 - 6) / 4) * 60;

if(resultado < 100){

document.getElementById("resultado1").innerHTML =
"Você deve usar o valor mínimo de 100 VA";

}
else{

document.getElementById("resultado1").innerHTML =
"Resultado: " + resultado.toFixed(2) + " VA";

}

}

</script>

<h1>Cálculo de Quantidade de Tomadas de Uso Comum</h1>

<label class="form-label">
Insira o Perímetro do ambiente
</label>

<input type="number" id="num2" class="form-control">

<br>

<button onclick="calcularTomadas()" class="btn btn-primary">
Calcular Tomadas Comuns
</button>

<h2 id="resultado2"></h2>

</div>


<div class="container mt-5">

<h1>Cálculo de Tomadas de Uso Especial</h1>

<label class="form-label">
Insira o Perímetro do ambiente
</label>

<input type="number" id="num3" class="form-control">

<br>

<button onclick="calcularEspecial()" class="btn btn-primary">
Calcular Tomadas Especiais
</button>

<h2 id="resultado3"></h2>

</div>

<script>

function calcularTomadas(){

let num2 = parseFloat(document.getElementById("num2").value);

let resultado = num2 / 5;

if(resultado <= 1){

document.getElementById("resultado2").innerHTML =
"Você deve usar o valor mínimo de 1 tomada!";

}
else{

document.getElementById("resultado2").innerHTML =
"Resultado: " + resultado.toFixed(2) + " UNDS";

}

}


function calcularEspecial(){

let num3 = parseFloat(document.getElementById("num3").value);

let resultado = num3 / 3.5;

if(resultado <= 1){

document.getElementById("resultado3").innerHTML =
"Você deve usar o valor mínimo de 1 tomada!";

}
else{

document.getElementById("resultado3").innerHTML =
"Resultado: " + resultado.toFixed(2) + " UNDS";

}

}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
