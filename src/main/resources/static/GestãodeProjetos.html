<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Gestão de Projetos Elétricos</title>

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>

    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>

</head>

<style>
    body {
        font-family: Arial;
        margin: 0;
        background: #f2f2f2;
    }

    /* BARRA SUPERIOR */

    .topo {
        background: #2c3e50;
        color: white;
        padding: 15px;
        text-align: center;
        font-size: 24px;
    }

    /* CONTAINER */

    .container {
        width: 900px;
        margin: auto;
        margin-top: 20px;
    }

    /* CARD */

    .card {
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0px 0px 8px gray;
        margin-bottom: 20px;
    }

    /* LOGO */

    .logo {
        text-align: center;
    }

    .campo-direita {
        text-align: right;
    }

    #usuariologado {
        text-align: right;
        float: right;
        padding: 6px 10px;
        text-align: right;
        font-weight: bold;
        font-size: 14px;
        color: #003366;
        background: #e6f2ff;
        border: 2px solid #007bff;
        border-radius: 6px;
        box-shadow: 0px 2px 4px rgba(0, 0, 0, 0.2);
    }

    /* INPUTS */
    input {
        width: 100%;
        padding: 8px;
        margin-top: 8px;
    }

    /* GRID FORM */

    .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
    }

    /* BOTÕES */

    .botoes {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 20px;
    }

    /* padrão de botão */
    .botoes button {
        padding: 10px 18px;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s ease;
        color: white;
    }

    /* padrão de botão */
    .login button {
        padding: 10px 18px;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s ease;

        color: white;
        background-color: #007bff;
        /* azul padrão */
    }


    #salvar {
        background: #27ae60;
        color: white;
    }

    #editar {
        background: #73ae27;
        color: white;
    }

    #limparCampos {
        background: #f39c12;
        color: white;
    }

    #buscarCliente {
        background: #f37712;
        color: white;
    }

    #listarTodos {
        background: #2980b9;
        color: white;
    }

    .autenticar {
        background: #7827ae;
        color: white;
    }

    .logout {
        background: #ae2b27;
        color: white;
    }

    /* TABELA */

    table {
        width: 100%;
        border-collapse: collapse;
    }

    th,
    td {
        border: 1px solid #ddd;
        padding: 8px;
        text-align: center;
    }

    th {
        background: #34495e;
        color: white;
    }
</style>

</head>

<body>

    <div class="container">

        <div class="card">

            <div class="campo-direita">
                <input type="text" id="usuariologado" placeholder="Default" style="width:33%;">
            </div>

            <a href="PaginaPessoal.html" class="btn btn-default">
                <span class="glyphicon glyphicon-home"></span> Página Principal
            </a>

            <div class="logo">
                <h1><img src="Imagens/carlos1.gif" width="60">
                    Gestão de Projetos em DWG e outros</h1>
            </div>

            <h2>Cadastro de Projetos</h2>

            <div class="grid">

                <input type="text" id="id" placeholder="ID">

                <input type="text" id="titulo" placeholder="Título">

                <input type="text" id="cliente" placeholder="Cliente">

                <input type="text" id="tamanhodoimovel" placeholder="Tamanho do Imovel">

                <input type="text" id="valordoprojeto" placeholder="Valor do Projeto">

                <input type="text" id="datadaentrega" placeholder="Data da Entrega">

                <input type="text" id="tipo" placeholder="Tipo">

                <input type="text" id="genero" placeholder="Gênero">

            </div>

            <div class="botoes">

                <button id="salvar" onclick="salvar()">Salvar</button>

                <button id="editar" onclick="editar()">Atualizar os Dados</button>

                <button id="limparCampos" onclick="limparCampos()">Limpar</button>

                <button id="buscarCliente" onclick="buscarCliente()">Buscar Cliente</button>

                <button id="listarTodos" onclick="listarTodos()">Listar Projetos</button>

            </div>

            <div class="login">

                <h2>Realizar Login</h2>

                <input type="text" id="usuario" placeholder="usuario" style="width:33%;">

                <input type="text" id="senha" placeholder="senha" style="width:33%;">

                <button onclick="autenticar()">Entrar</button>
                <button onclick="logout()">Sair</button>

            </div>

        </div>

        <div class="card">

            <h2>Lista de Projetos</h2>

            <table>

                <thead>

                    <tr>
                        <th>Id</th>
                        <th>Título</th>
                        <th>Cliente</th>
                        <th>T.doImovel</th>
                        <th>Valor</th>
                        <th>DataEntrega</th>
                        <th>Tipo</th>
                        <th>Ação</th>

                    </tr>

                </thead>

                <tbody id="tabelaProjetos">

                </tbody>

            </table>

        </div>

    </div>

    <script>

        const id = document.getElementById("id").value;

        const api = "http://localhost:8084/projetos";

        window.onload = function () {

            if (localStorage.getItem("usuariologado")) {
                liberarFuncoes();

            } else {

                bloquearFuncoes();
            }

        }

        function liberarFuncoes() {

            document.getElementById("salvar").disabled = false;
            document.getElementById("editar").disabled = false;
            document.getElementById("listarTodos").disabled = false;

        }

        function bloquearFuncoes() {

            document.getElementById("salvar").disabled = true;
            document.getElementById("editar").disabled = true;

            document.getElementById("listarTodos").disabled = true;

        }

        // FUNÇÃO PARA LISTAR TODOS PROJETOS
        function listarTodos() {

            fetch(api)
                .then(response => response.json())
                .then(data => {

                    const tabela = document.getElementById("tabelaProjetos");

                    tabela.innerHTML = "";

                    data.forEach(show => {

                        tabela.innerHTML += `
<tr>
<td>${show.id}</td>
<td>${show.titulo}</td>
<td>${show.cliente}</td>
<td>${show.tamanhodoimovel}</td>
<td>${show.valordoprojeto}</td>
<td>${show.datadaentrega}</td>
<td>${show.tipo}</td>

<td>

<button class="btn btn-danger btn-sm"
onclick="deletar(${show.id})">
Excluir
</button>
</td>

</tr>
`;

                    });

                });
        }

        // FUNÇÃO PARA SALVAR
        function salvar() {

            if (confirm("Tem certeza que deseja salvar esses dados?")) {

                const titulo = document.getElementById("titulo").value;
                const cliente = document.getElementById("cliente").value;
                const tamanhodoimovel = document.getElementById("tamanhodoimovel").value;
                const valordoprojeto = document.getElementById("valordoprojeto").value;
                const datadaentrega = document.getElementById("datadaentrega").value;
                const tipo = document.getElementById("tipo").value;
                const genero = document.getElementById("genero").value;

                alert("Projeto salvo com sucesso!");

                fetch(api, {

                    method: "POST",

                    headers: {
                        "Content-Type": "application/json"
                    },

                    body: JSON.stringify({

                        titulo,
                        cliente,
                        tamanhodoimovel,
                        valordoprojeto,
                        datadaentrega,
                        tipo,
                        genero

                    })

                })

                    .then(response => response.json())

                    .then(data => {

                        limparCampos();

                        listarTodos();

                    });

            }
        }


        // FUNÇÃO PARA EDITAR OS DADOS NA TABELA
        function editar() {

            if (confirm("Tem certeza que deseja editar estes dados?")) {

                const id = document.getElementById("id").value;

                const dados = {

                    titulo: document.getElementById("titulo").value,
                    cliente: document.getElementById("cliente").value,
                    tamanhodoimovel: document.getElementById("tamanhodoimovel").value,
                    valordoprojeto: document.getElementById("valordoprojeto").value,
                    datadaentrega: document.getElementById("datadaentrega").value,
                    tipo: document.getElementById("tipo").value,
                    genero: document.getElementById("genero").value

                };

                fetch(api + "/" + id, {

                    method: "PUT",

                    headers: {
                        "Content-Type": "application/json"
                    },

                    body: JSON.stringify(dados)

                })

                    .then(() => {

                        alert("Dados atualizados com sucesso!");

                        limparCampos();
                        listarTodos();

                    });

            }
        }


        // FUNÇÃO PARA EXCLUIR
        function deletar(id) {

            if (confirm("Tem certeza que deseja excluir este registro?")) {

                fetch(`${api}/${id}`, {
                    method: "DELETE"
                })
                    .then(() => {
                        alert("Registro excluído com sucesso!");
                        listarTodos();
                    })
                    .catch(error => {
                        console.error("Erro ao excluir:", error);
                        alert("Erro ao excluir o registro.");
                    });

            }

        }


        // FUNÇÃO PARA CONSULTAR POR CLIENTE
        function buscarCliente() {

            const cliente = document.getElementById("cliente").value;

            if (cliente === "") {
                alert("⚠️ Informe o cliente a ser consultado!");
                return;
            }

            fetch("http://localhost:8084/projetos/buscar?cliente=" + encodeURIComponent(cliente))

                .then(response => response.json())

                .then(data => {

                    const tabela = document.getElementById("tabelaProjetos");

                    tabela.innerHTML = "";

                    if (data.length === 0) {

                        tabela.innerHTML = `
<tr>
<td colspan="7">Nenhum resultado encontrado</td>
</tr>
`;

                        return;
                    }

                    data.forEach(show => {

                        tabela.innerHTML += `
<tr>
<td>${show.id}</td>
<td>${show.titulo}</td>
<td>${show.cliente}</td>
<td>${show.tamanhodoimovel}</td>
<td>${show.valordoprojeto}</td>
<td>${show.datadaentrega}</td>
<td>${show.tipo}</td>

<td>
<button class="btn btn-danger btn-sm"
onclick="deletar(${show.id})">
Excluir
</button>
</td>

</tr>
`;
                    });

                });

        }


        // FUNÇÃO PARA AUTENTICAR O USUARIO NO BANCO E MOSTRAR NA TELA
        function autenticar() {

            const usuario = document.getElementById("usuario").value;
            const senha = document.getElementById("senha").value;

            // Validação de campos vazios
            if (usuario === "" && senha === "") {
                alert("⚠️ Informe usuario e senha para realizar Login!");
                return;
            }

            if (usuario === "") {
                alert("⚠️ Informe o usuário!");
                return;
            }

            if (senha === "") {
                alert("⚠️ Informe a senha!");
                return;
            }

            fetch("http://localhost:8084/usuario/login", {

                method: "POST",

                headers: {
                    "Content-Type": "application/json"
                },

                body: JSON.stringify({
                    usuario,
                    senha
                })

            })

                .then(response => {

                    if (!response.ok) {
                        throw new Error("Login inválido");
                    }

                    return response.json();

                })

                .then(data => {

                    // Mostra o usuário no campo Default

                    document.getElementById("usuariologado").value = data.usuario;
                    alert("Login realizado com sucesso!");
                    liberarFuncoes();
                    limparLogin();

                })


                .catch(error => {

                    alert("Usuário ou senha incorretos");

                });

        }


        // FUNÇÃO EFETUAR O LOGOUT
        function logout() {

            localStorage.removeItem("usuariologado");

            document.getElementById("usuariologado").value = "";

            bloquearFuncoes();

        }


        // FUNÇÃO PARA LIMPAR OS CAMPOS DO LOGIN
        function limparLogin() {
            document.getElementById("usuario").value = "";
            document.getElementById("senha").value = "";

        }

        // FUNÇÃO LIMPAR OS CAMPOS DO FORMULÁRIO
        function limparCampos() {
            document.getElementById("id").value = "";
            document.getElementById("titulo").value = "";
            document.getElementById("cliente").value = "";
            document.getElementById("tamanhodoimovel").value = "";
            document.getElementById("valordoprojeto").value = "";
            document.getElementById("datadaentrega").value = "";
            document.getElementById("tipo").value = "";
            document.getElementById("genero").value = "";

        }

    </script>

</body>

</html>
