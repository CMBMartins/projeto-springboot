<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Cadastro de Usuários</title>

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>

    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>

    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css">

    <style>
        body {
            background: linear-gradient(135deg, #e6ecf0, #f8f9fa);
            font-family: Arial;
        }

        .card-form {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 5px 20px rgba(0, 0, 0, 0.15);
            max-width: 420px;
            margin: 50px auto;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header img {
            width: 50px;
        }

        .header h3 {
            margin-top: 10px;
            font-weight: bold;
            color: #2c3e50;
        }

        .grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .grid input {
            height: 42px;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
            transition: 0.3s;
        }

        .grid input:focus {
            border-color: #007bff;
            box-shadow: 0 0 5px rgba(0, 123, 255, 0.4);
            outline: none;
        }

        .botoes {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .btn-custom {
            padding: 8px 14px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 13px;
            transition: 0.3s;
        }

        .btn-salvar {
            background: #28a745;
            color: white;
        }

        .btn-salvar:hover {
            background: #218838;
        }

        .btn-editar {
            background: #ffc107;
            color: black;
        }

        .btn-editar:hover {
            background: #e0a800;
        }

        .btn-limpar {
            background: #6c757d;
            color: white;
        }

        .btn-limpar:hover {
            background: #5a6268;
        }

        .btn-buscar {
            background: #007bff;
            color: white;
        }

        .btn-buscar:hover {
            background: #0056b3;
        }

        .btn-home {
            display: inline-block;
            margin-bottom: 15px;
            text-decoration: none;
            color: #007bff;
            font-weight: bold;
        }

        .btn-home:hover {
            text-decoration: underline;
        }

        .card {
            background: #ffffff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.15);
            margin-top: 20px;
        }

        /* Título */
        .card h2 {
            margin-bottom: 15px;
            color: #2c3e50;
            font-weight: bold;
        }

        /* Tabela */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        /* Cabeçalho */
        thead {
            background: #34495e;
            color: white;
        }

        th {
            padding: 12px;
            text-align: center;
            font-weight: bold;
        }

        /* Linhas */
        td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        /* Zebra (linhas alternadas) */
        tbody tr:nth-child(even) {
            background: #f9f9f9;
        }

        /* Hover (efeito ao passar o mouse) */
        tbody tr:hover {
            background: #e6f2ff;
            cursor: pointer;
            transition: 0.3s;
        }

        /* Botões dentro da tabela */
        td button {
            padding: 5px 10px;
            margin: 2px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            transition: 0.3s;
        }

        /* Editar */
        td button:first-child {
            background: #ffc107;
            color: black;
        }

        td button:first-child:hover {
            background: #e0a800;
        }

        /* Excluir */
        td button:last-child {
            background: #dc3545;
            color: white;
        }

        td button:last-child:hover {
            background: #c82333;
        }
    </style>

    <div class="card-form">

        <a href="PaginaPessoal.html" class="btn-home">
            ← Página Principal
        </a>

        <div class="header">
            <h3><img src="Imagens/carlos1.gif">
                Cadastro de Usuários</h3>
        </div>

        <div class="grid">

            <input type="text" id="id" placeholder="ID">

            <input type="text" id="usuario" placeholder="Usuário">

            <input type="password" id="senha" placeholder="Senha">

            <input type="text" id="perfil" placeholder="Perfil">
        </div>

        <div class="botoes">
            <button class="btn-custom btn-salvar" onclick="salvar()">Salvar</button>

            <button class="btn-custom btn-limpar" onclick="limparCampos()">Limpar</button>

            <button class="btn-custom btn-buscar" onclick="buscarUsuario()">Buscar Usuario</button>
        </div>

        <br>

        <div class="card">

            <h2>Lista de Usuários</h2>

            <table>

                <thead>

                    <tr>

                        <th>ID</th>
                        <th>Usuário</th>
                        <th>Perfil</th>
                        <th>Ação</th>

                    </tr>

                </thead>

                <tbody id="tabelaUsuario">

                </tbody>

            </table>

        </div>

        <script>

            //const api = "http://localhost:8084/usuario";
            const API = "https://projeto-springboot.onrender.com/usuario";

            //Função carregar
            function carregar() {
                //listarTodos();
            }

            //Função para Salvar
            function salvar() {

                if (!confirm("Tem certeza que deseja salvar esses dados?")) return;

                const usuario = document.getElementById("usuario").value.trim();
                const senha = document.getElementById("senha").value.trim();
                const perfil = document.getElementById("perfil").value.trim();

                if (!usuario || !senha || !perfil) {
                    alert("⚠️ Preencha todos os campos!");
                    return;
                }

                fetch(API, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ usuario, senha, perfil })
                })
                    .then(res => {
                        if (!res.ok) throw new Error("Erro ao salvar");
                        return res.json();
                    })
                    .then(() => {
                        alert("Usuário salvo com sucesso!");
                        limparCampos();
                        //listarTodos();
                    })
                    .catch(err => {
                        console.error(err);
                        alert("Erro ao salvar usuário!");
                    });
            }

            //Função para Editar Usuário
            function editar(id) {

                if (!id) {
                    alert("ID inválido!");
                    return;
                }

                if (!confirm("Deseja atualizar este registro?")) return;

                const dados = {
                    id,
                    usuario: document.getElementById("usuario").value,
                    senha: document.getElementById("senha").value,
                    perfil: document.getElementById("perfil").value
                };

                fetch(`${API}/${id}`, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(dados)
                })
                    .then(res => {
                        if (!res.ok) throw new Error("Erro ao atualizar");
                        return res.json();
                    })
                    .then(() => {
                        alert("Atualizado com sucesso!");
                        limparCampos();
                        //listarTodos();
                    })
                    .catch(err => {
                        console.error(err);
                        alert("Erro ao atualizar!");
                    });
            }


            //Função para pesquisar por Usuário
            function buscarUsuario() {

                const usuario = document.getElementById("usuario").value;

                if (!usuario) {
                    alert("Informe o usuário!");
                    return;
                }

                fetch(API + "/buscar?usuario=" + encodeURIComponent(usuario))
                    .then(res => res.json())
                    .then(data => {
                        limparCampos();

                        const tabela = document.getElementById("tabelaUsuario");
                        tabela.innerHTML = "";

                        if (!Array.isArray(data) || data.length === 0) {
                            tabela.innerHTML = "<tr><td colspan='4'>Nenhum resultado</td></tr>";
                            return;
                        }

                        data.forEach(show => {
                            tabela.innerHTML += `
                    <tr>
                        <td>${show.id}</td>
                        <td>${show.usuario}</td>
                        <td>${show.perfil}</td>
                        <td>
                            <button onclick="editar(${show.id})">Editar</button>                            
                        </td>
                    </tr>
                `;
                        });

                    })
                    .catch(() => alert("Erro ao buscar usuários"));
            }

            //Função para Limpar os campos
            function limparCampos() {
                document.getElementById("id").value = "";
                document.getElementById("usuario").value = "";
                document.getElementById("senha").value = "";
                document.getElementById("perfil").value = "";

            }

        </script>
        </body>

</html>
