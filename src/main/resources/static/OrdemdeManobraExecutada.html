<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Ordem de Manobra Executada</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #dcdcdc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .janela {
            width: 800px;
            background: #f2f2f2;
            border: 2px solid #999;
            padding: 20px;
            box-shadow: 4px 4px 10px rgba(0, 0, 0, .3);
        }

        .titulo {
            text-align: center;
            color: blue;
            font-size: 38px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .subtitulo {
            text-align: center;
            color: red;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 30px;
        }

        .lista-manobras {
            display: none;
            grid-template-columns: 1fr 1fr;
            gap: 8px 40px;
            margin-bottom: 30px;
        }

        .item {
            font-size: 18px;
            font-style: italic;
            color: #222;
        }

        .botoes {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .botoes button {
            width: 130px;
            height: 40px;
            border: 1px solid #666;
            background: #c0c0ff;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
        }

        .botoes button:hover {
            background: #9fa8ff;
        }
    </style>
</head>

<body>

    <div class="janela">

        <div class="titulo">
            Manobra Executada!
        </div>

        <div class="subtitulo" id="nomeManobra">
            Nenhuma Manobra Habilitada
        </div>

        <div class="lista-manobras" id="listaManobras">
        </div>

        <div class="botoes">
            <button onclick="visualizar()">Visualizar</button>
            <button onclick="limpar()">Limpar</button>
            <button onclick="window.close()">Sair</button>
        </div>

    </div>

    <script>

        function visualizar() {
            carregarManobra();
        }


        function limpar() {

            document.getElementById("nomeManobra").innerHTML =
                "Nenhuma Manobra Habilitada";

            document.getElementById("listaManobras").innerHTML = "";

            document.getElementById("listaManobras").style.display =
                "none";

            localStorage.removeItem(
                "manobraAtual"
            );
        }


        // FUNÇÃO QUE MOSTRA A MANOBRA  EXECUTADA QUE FOI  HABILITADA
        function carregarManobra() {

            let codigo =
                localStorage.getItem(
                    "manobraAtual"
                );

            if (!codigo) {
                return;
            }

            let manobra =
                manobras[codigo];

            if (!manobra) {
                return;
            }

            document.getElementById(
                "nomeManobra"
            ).innerHTML =
                manobra.titulo;

            let lista =
                document.getElementById(
                    "listaManobras"
                );

            lista.innerHTML = "";

            let passosExecutados =
                JSON.parse(
                    localStorage.getItem(
                        "passosExecutados"
                    )
                ) || [];

            if (passosExecutados.length === 0) {

                lista.innerHTML =
                    "<div class='item'>Nenhum passo executado ainda...</div>";

            } else {

                passosExecutados.forEach(
                    (passo, indice) => {

                        lista.innerHTML += `
                <div class="item"
                    style="
                        color:green;
                        font-weight:bold;
                    ">
                    ✅ ${indice + 1}. ${passo}
                </div>
            `;
                    }
                );
            }

            lista.style.display = "grid";
        }

        window.onload = function () {

            carregarManobra();

            setInterval(
                carregarManobra,
                1000
            );
        };

        const manobras = {

            EnergizarLinha1: {

                titulo: "OM para Energizar Linha 1",

                passos: [
                ]
            },

            DesenergizarLinha1: {

                titulo: "OM para Desenergizar Linha 1",

                passos: [
                ]
            },

            EnergizarLinha2: {

                titulo: "OM para Energizar Linha 2",

                passos: [
                ]
            },

            DesenergizarLinha2: {

                titulo: "OM para Desenergizar Linha 2",

                passos: [
                ]
            },

            EnergizarLinha1BarraA: {

                titulo: "OM para Energizar Linha 1 e Barra A",

                passos: [
                ]
            },

            DesenergizarLinha1BarraA: {

                titulo: "OM para Desenergizar Linha 1 e Barra A",

                passos: [
                ]
            },

            EnergizarLinha2BarraB: {

                titulo: "OM para Energizar Linha 2 e Barra B",

                passos: [
                ]
            },

            DesenergizarLinha2BarraB: {

                titulo: "OM para Desenergizar Linha 2 e Barra B",

                passos: [
                ]
            },

            EnergizarBayMT1: {

                titulo: "OM para Energizar Bay do MT1",

                passos: [
                ]
            },

            DesenergizarBayMT1: {

                titulo: "OM para Desenergizar Bay do MT1",

                passos: [
                ]
            },

            EnergizarBayMTR: {

                titulo: "OM para Energizar Bay do MTR",

                passos: [
                ]
            },

            DesenergizarBayMTR: {

                titulo: "OM para Desenergizar Bay do MTR",

                passos: [
                ]
            },

            EnergizarBayMT2: {

                titulo: "OM para Energizar Bay do MT2",

                passos: [
                ]
            },

            DesenergizarBayMT2: {

                titulo: "OM para Desenergizar Bay do MT2",

                passos: [
                ]
            },

            EnergizarBayMT3: {

                titulo: "OM para Energizar Bay do MT3",

                passos: [
                ]
            },

            DesenergizarBayMT3: {

                titulo: "OM para Desenergizar Bay do MT3",

                passos: [
                ]
            },

            EnergizarBayMT4: {

                titulo: "OM para Energizar Bay do MT4",

                passos: [                //"Fechar Seccionadora 89L2",
                ]
            },

            DesenergizarBayMT4: {

                titulo: "OM para Desenergizar Bay do MT4",

                passos: [
                ]
            },

        };

    </script>

</body>

</html>
