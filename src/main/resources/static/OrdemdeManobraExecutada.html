<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Ordem de Manobra Executada</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #dcdcdc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .janela {
            width: 800px;
            background: #f2f2f2;
            border: 2px solid #999;
            padding: 20px;
            box-shadow: 4px 4px 10px rgba(0, 0, 0, .3);
        }

        .titulo {
            text-align: center;
            color: blue;
            font-size: 38px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .subtitulo {
            text-align: center;
            color: red;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 30px;
        }

        .lista-manobras {
            display: none;
            grid-template-columns: 1fr 1fr;
            gap: 8px 40px;
            margin-bottom: 30px;
        }

        .item {
            font-size: 18px;
            font-style: italic;
            color: #222;
        }

        .botoes {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .botoes button {
            width: 130px;
            height: 40px;
            border: 1px solid #666;
            background: #c0c0ff;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
        }

        .botoes button:hover {
            background: #9fa8ff;
        }
    </style>
</head>

<body>

    <div class="janela">

        <div class="titulo">
            Manobra Executada!
        </div>

        <div class="subtitulo" id="nomeManobra">
            Nenhuma Manobra Habilitada
        </div>
        
        <div class="lista-manobras" id="listaManobras">
        </div>

        <div class="botoes">
            <button onclick="visualizar()">Visualizar</button>
            <button onclick="limpar()">Limpar</button>
            <button onclick="window.close()">Sair</button>
        </div>

    </div>

    <script>

        function visualizar() {
            carregarManobra();
        }
       
        
        function limpar() {
            
         document.getElementById("nomeManobra").innerHTML =
        "Nenhuma Manobra Habilitada";

         document.getElementById("listaManobras").innerHTML = "";

        document.getElementById("listaManobras").style.display =
        "none";

        localStorage.removeItem(
        "manobraAtual"
        );        
        }


    // FUNÇÃO QUE MOSTRA A MANOBRA  EXECUTADA QUE FOI  HABILITADA
    function carregarManobra() {

    let codigo =
        localStorage.getItem(
            "manobraAtual"
        );

    if (!codigo) {
        return;
    }

    let manobra =
        manobras[codigo];

    if (!manobra) {
        return;
    }

    document.getElementById(
        "nomeManobra"
    ).innerHTML =
        manobra.titulo;

    let lista =
        document.getElementById(
            "listaManobras"
        );

    lista.innerHTML = "";

    let passosExecutados =
        JSON.parse(
            localStorage.getItem(
                "passosExecutados"
            )
        ) || [];

    manobra.passos.forEach(
        (passo, indice) => {

            let executado =
                passosExecutados.includes(
                    passo
                );

            lista.innerHTML += `
                <div class="item"
                    style="
                    color:${executado ? 'green' : 'black'};
                    font-weight:${executado ? 'bold' : 'normal'};
                    ">
                    ${executado ? '✅' : '⬜'}
                    ${indice + 1}. ${passo}
                </div>
            `;
        }
    );

    lista.style.display = "grid";
}

    </script>

</body>

</html>
