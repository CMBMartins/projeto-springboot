<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Gestão de Contatos Pessoais</title>

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>

    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
</head>

<style>
    body {
        background-color: #f6f6f6;
        font-family: Arial;
    }

    .topo {
        background: #2c3e50;
        color: white;
        padding: 15px;
        text-align: center;
        font-size: 24px;
    }

    .container {
        max-width: 900px;
        margin: auto;
        margin-top: 20px;
    }

    .card {
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0px 0px 8px gray;
        margin-bottom: 20px;
    }

    /* LOGO */

    .logo {
        text-align: center;
    }


    .campo-direita {
        text-align: right;
    }

    #usuariologado {
        text-align: right;
        float: right;
        padding: 6px 10px;
        text-align: right;
        font-weight: bold;
        font-size: 14px;
        color: #003366;
        background: #e6f2ff;
        border: 2px solid #007bff;
        border-radius: 6px;
        box-shadow: 0px 2px 4px rgba(0, 0, 0, 0.2);
    }

    /* INPUTS */

    input {
        width: 100%;
        padding: 8px;
        margin-top: 8px;
    }

    /* GRID FORM */

    .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
    }

    /* BOTÕES */

    .botoes {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 20px;
    }

    /* padrão de botão */
    .botoes button {
        width: 158px;
        height: 46px;
        padding: 10px 18px;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s ease;
        color: white;
    }

    /* padrão de botão */
    .login button {
        padding: 10px 18px;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s ease;

        color: white;
        background-color: #007bff;
        /* azul padrão */
    }


    #salvar {
        background: #27ae60;
        color: white;
    }

    #editar {
        background: #73ae27;
        color: white;
    }

    #limparCampos {
        background: #f39c12;
        color: white;
    }

    #buscarContato {
        background: #f37712;
        color: white;
    }

    #listarTodos {
        background: #2980b9;
        color: white;
    }

    .autenticar {
        background: #7827ae;
        color: white;
    }

    .logout {
        background: #ae2b27;
        color: white;
    }

    /* TABELA */
    table {
        width: 100%;
        border-collapse: collapse;
    }

    th,
    td {
        border: 1px solid #ddd;
        padding: 8px;
        text-align: center;
    }

    th {
        background: #34495e;
        color: white;
    }

    .linha-celular {
        background-color: #ffe5e5;
    }

    .linha-whatsapp {
        background-color: #e5ffe5;
    }
</style>

</head>

<body>

    <div class="container">

        <div class="card">

            <div class="campo-direita">
                <input type="text" id="usuariologado" placeholder="Default" style="width:33%;">
            </div>

            <a href="PaginaPessoal.html" class="btn btn-default">
                <span class="glyphicon glyphicon-home"></span> Página Principal
            </a>

            <div class="logo">
                <h1><img src="Imagens/carlos1.gif" width="60">
                    Gestão de Contatos Pessoais</h1>
            </div>

            <h2>Cadastrar ou Alterar Contatos</h2>

            <div class="grid">

                <input type="text" id="id" placeholder="ID">

                <input type="text" id="cpf" placeholder="CPF">

                <input type="text" id="nome" placeholder="Nome">

                <input type="text" id="telefone" placeholder="Telefone">

                <input type="text" id="endereço" placeholder="Endereço">

            </div>

            <div class="botoes">

                <button id="salvar" onclick="salvar()">💾Salvar</button>

                <button id="editar" onclick="editar()">✏️Editar Dados</button>

                <button id="limparCampos" onclick="limparCampos()">🧹Limpar</button>

                <button id="buscarContato" onclick="buscarContato()">🔍Buscar Contato</button>

                <button id="listarTodos" onclick="listarTodos()">📋Listar Contatos</button>

            </div>

            <div class="login">

                <h2>Realizar Login</h2>

                <input type="text" id="usuario" placeholder="usuario" style="width:33%;">

                <input type="text" id="senha" placeholder="senha" style="width:33%;">

                <button onclick="autenticar()">🚪➡️Entrar</button>
                <button onclick="logout()">🚪⬅️Sair</button>

            </div>

        </div>

        <div class="card">

            <h2>Lista de Contatos</h2>

            <table>

                <thead>

                    <tr>

                        <th>CPF</th>
                        <th>Nome</th>
                        <th>Telefone</th>
                        <th>Endereço</th>
                        <th>Ação</th>

                    </tr>

                </thead>

                <tbody id="tabelaContato">

                </tbody>

            </table>

        </div>

    </div>

    <script>

        const id = document.getElementById("id").value;

        const API = "https://projeto-springboot.onrender.com";

        //FUNÇÃO PARA INICIAR A JANELA (PAGINA)
        window.onload = function () {
            localStorage.removeItem("usuario");
            localStorage.removeItem("loggedIn");
        };

        function iniciarSistema() {
            console.log("Sistema iniciado");
        }

        //FUNÇÃO PARA INICIAR USUARIO
        function getUsuario() {

            const user = localStorage.getItem("usuario");

            if (!user || user === "undefined" || user === "null") {

                return null;
            }

            return user;
        }

        //FUNÇÃO PARA FECH SEGURO
        function fetchSeguro(url, options = {}) {
            return fetch(url, options); // ✔️ NÃO converte nada
        }


        // FUNÇÃO PARA LISTAR TODOS CONTATOS
        function listarTodos() {

            const usuario = getUsuario();

            if (!usuario) {
                console.warn("Usuário não definido!");
                alert("⚠️ Faça Login!");
                return;
            }

            const tabela = document.getElementById("tabelaContato");

            if (!tabela) {
                console.error("Elemento tabelaContato não encontrado!");
                return;
            }

            // Mensagem inicial
            tabela.innerHTML = "<tr><td colspan='5'>Carregando contatos...</td></tr>";

            fetchSeguro(`${API}/contato/usuario?usuario=${encodeURIComponent(usuario)}`)
                .then(response => {

                    console.log("Status:", response.status);

                    if (!response.ok) {
                        throw new Error(`Erro HTTP: ${response.status}`);
                    }

                    return response.json();
                })
                .then(data => {

                    if (!Array.isArray(data)) {
                        console.error("Resposta inválida:", data);
                        tabela.innerHTML =
                            "<tr><td colspan='5'>Erro ao carregar contatos</td></tr>";
                        return;
                    }

                    if (data.length === 0) {
                        tabela.innerHTML =
                            "<tr><td colspan='5'>Nenhum contato encontrado</td></tr>";
                        return;
                    }

                    let linhas = "";

                    data.forEach(contato => {

                        // Classe visual da linha
                        const classeLinha = contato.telefone === "Celular"
                            ? "linha-celular"
                            : "linha-whatsapp";

                        // Texto do botão
                        const textoBotao = contato.telefone === "Celular"
                            ? "Manter"
                            : "Mudar Telefone";

                        linhas += `
                    <tr class="${classeLinha}">
                        <td>${contato.cpf ?? ""}</td>
                        <td>${contato.nome ?? ""}</td>
                        <td>${contato.telefone ?? ""}</td>
                        <td>${contato.endereço ?? ""}</td>
                        <td>
                            <button onclick="editarTelefone(${contato.id}, '${contato.telefone ?? ""}')">
                                ${textoBotao}
                            </button>
                        </td>
                    </tr>
                `;
                    });

                    tabela.innerHTML = linhas;
                })
                .catch(err => {

                    console.error("Erro ao listar contatos:", err);

                    tabela.innerHTML =
                        "<tr><td colspan='5'>Erro ao carregar dados</td></tr>";
                });
        }

        // FUNÇÃO PARA SALVAR CONTATOS
        function salvar() {

            const usuario = getUsuario();

            if (!usuario) {
                console.warn("Usuário não definido!");
                alert("⚠️ Faça Login!");
                return;
            }

            if (!confirm("Tem certeza que deseja salvar esses dados?")) return;

            const cpf = document.getElementById("cpf")?.value.trim();
            const nome = document.getElementById("nome")?.value.trim();
            const telefone = document.getElementById("telefone")?.value.trim();
            const endereço = document.getElementById("endereço")?.value;
            usuario: usuario

            const dados = {
                cpf,
                nome,
                telefone,
                endereço,
                usuario // 🔥 vem do localStorage
            };

            fetchSeguro(`${API}/contato`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(dados)
            })
                .then(response => {
                    console.log("STATUS REAL:", response.status);

                    if (!response.ok) {
                        throw new Error(`Erro: ${response.status}`);
                    }

                    return response.json(); // ✔️ aqui sim
                })
                .then(data => {
                    console.log("Retorno correto:", data);

                    alert("✅ Dados salvos com sucesso!");
                    limparCampos();
                    listarTodos();
                })
                .catch(error => {
                    console.error("Erro ao salvar:", error);
                    alert("❌ Erro ao salvar dados");
                });

        }


        // FUNÇÃO PARA EDITAR OS DADOS NA TABELA
        function editar() {

            if (confirm("Tem certeza que deseja editar estes dados?")) {

                const id = document.getElementById("id").value;

                const dados = {

                    cpf: document.getElementById("cpf").value,
                    integrante: document.getElementById("integrante").value,
                    telefone: document.getElementById("telefone").value,
                    bemcadastrado: document.getElementById("bemcadastrado").value,
                    documento: document.getElementById("documento").value

                };

                fetch(api + "/" + id, {

                    method: "PUT",

                    headers: {
                        "Content-Type": "application/json"
                    },

                    body: JSON.stringify(dados)

                })

                    .then(() => {

                        alert("Dados atualizados com sucesso!");

                        limparCampos();

                        listarTodos();

                    });
            }

        }

        // FUNÇÃO PARA EXCLUIR
        function deletar(id) {

            if (confirm("Tem certeza que deseja excluir este registro?")) {

                fetch(`${api}/${id}`, {
                    method: "DELETE"
                })
                    .then(() => {
                        alert("Registro excluído com sucesso!");
                        listarTodos();
                    })
                    .catch(error => {
                        console.error("Erro ao excluir:", error);
                        alert("Erro ao excluir o registro.");
                    });

            }

        }

        function limparCampos() {

            document.getElementById("cpf").value = "";
            document.getElementById("nome").value = "";
            document.getElementById("telefone").value = "";
            document.getElementById("endereço").value = "";

        }

        //FUNÇÃO PARA CONSULTAR POR NOME
        function buscarContato() {

            const usuario = getUsuario();

            if (!usuario) {
                alert("⚠️ Faça Login!");
                return;
            }

            const contato = document.getElementById("contato").value.trim();

            if (!contato) {
                alert("⚠️ Informe o contato a ser consultado!");
                return;
            }

            fetchSeguro(`${API}/contatos/buscar?contato=${encodeURIComponent(contato)}`)
                .then(response => {

                    console.log("Status:", response.status);

                    if (!response.ok) {
                        throw new Error(`Erro: ${response.status}`);
                    }

                    return response.json(); // 🔥 ESSENCIAL
                })
                .then(data => {

                    const tabela = document.getElementById("tabelaContatos");

                    if (!Array.isArray(data)) {
                        console.error("Contato não encontrado:", data);
                        tabela.innerHTML = "<tr><td colspan='7'>Erro ao carregar</td></tr>";
                        return;
                    }

                    let linhas = "";

                    data.forEach(show => {

                        // 🎨 Classe da linha
                        const classeLinha = show.telefone === "Celular"
                            ? "linha-celular"
                            : "linha-whatsapp";

                        // 🔘 Texto do botão
                        const textoBotao = show.telefone === "Celular"
                            ? "Mudar"
                            : "ManterTelefone";

                        linhas += `
                    <tr>                        
                        <td>${show.id ?? ""}</td>
                        <td>${show.cpf ?? ""}</td>
                        <td>${show.nome ?? ""}</td>
                        <td>${show.telefone ?? ""}</td>                        
                        <td>${show.endereço ?? ""}</td>
                        <td>
                            <button onclick="editarTelefone(${show.id}, '${show.telefone}')">
                                ${textoBotao}
                            </button>
                        </td>
                    </tr>
                `;
                    });

                    tabela.innerHTML = linhas;

                })
                .catch(error => {
                    console.error("Erro ao buscar contato:", error);

                    const tabela = document.getElementById("tabelaContatos");
                    tabela.innerHTML = "<tr><td colspan='8'>Erro ao carregar dados</td></tr>";
                });
        }


        // FUNÇÃO PARA AUTENTICAR O USUARIO NO BANCO E MOSTRAR NA TELA
        function autenticar() {

            const usuario = document.getElementById("usuario").value;
            const senha = document.getElementById("senha").value;

            // Validação de campos vazios
            if (usuario === "" && senha === "") {
                alert("⚠️ Informe usuario e senha para realizar Login!");
                return;
            }

            if (usuario === "") {
                alert("⚠️ Informe o usuário!");
                return;
            }

            if (senha === "") {
                alert("⚠️ Informe a senha!");
                return;
            }

            fetch("https://projeto-springboot.onrender.com/usuario/login", {

                method: "POST",

                headers: {
                    "Content-Type": "application/json"
                },

                body: JSON.stringify({
                    usuario,
                    senha
                })

            })

                .then(response => {

                    if (!response.ok) {
                        throw new Error("Login inválido");
                    }

                    return response.json();

                })

                .then(data => {

                    // Mostra o usuário no campo Default
                    localStorage.setItem("usuario", data.usuario);
                    document.getElementById("usuariologado").value = data.usuario;
                    alert("Login realizado com sucesso!");
                    limparLogin();

                })


                .catch(error => {

                    alert("Usuário ou senha incorretos");

                });

        }


        // FUNÇÃO EFETUAR O LOGOUT
        function logout() {

            localStorage.removeItem("usuariologado");
            alert("🚪 Logout realizado com sucesso!");

            window.location.href = "GestãodeContatos.html";

        }


        // FUNÇÃO PARA LIMPAR OS CAMPOS DO LOGIN
        function limparLogin() {
            document.getElementById("usuario").value = "";
            document.getElementById("senha").value = "";

        }

    </script>

</body>

</html>
