<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Planilhas Eletricas</title>

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>

    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>

</head>

<style>
    body {
        font-family: Arial;
        margin: 0;
        background: #f2f2f2;
    }

    /* BARRA SUPERIOR */

    .topo {
        background: #2c3e50;
        color: white;
        padding: 15px;
        text-align: center;
        font-size: 24px;
    }

    /* CONTAINER */

    .container {
        width: 900px;
        margin: auto;
        margin-top: 20px;
    }

    /* CARD */

    .card {
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0px 0px 8px gray;
        margin-bottom: 20px;
    }

    /* LOGO */

    .logo {
        text-align: center;
    }

    .campo-direita {
        text-align: right;
    }

    #usuariologado {
        text-align: right;
        float: right;
        padding: 6px 10px;
        text-align: right;
        font-weight: bold;
        font-size: 14px;
        color: #003366;
        background: #e6f2ff;
        border: 2px solid #007bff;
        border-radius: 6px;
        box-shadow: 0px 2px 4px rgba(0, 0, 0, 0.2);
    }

    /* INPUTS */

    input {
        width: 100%;
        padding: 8px;
        margin-top: 8px;
    }

    /* GRID FORM */

    .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
    }

    /* BOTÕES */

    .botoes {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 20px;

    }

    /* padrão de botão */
    .botoes button {
        width: 130px;
        height: 40px;
        padding: 10px 18px;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s ease;
        color: white;
    }

    /* padrão de botão */
    .login button {
        width: 130px;
        height: 40px;
        padding: 10px 18px;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s ease;
        color: white;
        background-color: #007bff;
    }


    #salvar {
        background: #27ae60;
        color: white;
    }

    #editar {
        background: #6fae27;
        color: white;
    }

    #deletar {
        background: #ae2b27;
        color: white;
    }

    #limparCampos {
        background: #f39c12;
        color: white;
    }

    #buscarArtista {
        background: #f37712;
        color: white;
    }

    #listarTodos {
        background: #2980b9;
        color: white;
    }

    .autenticar {
        background: #7827ae;
        color: white;
    }

    .logout {
        background: #ae2b27;
        color: white;
    }

    /* TABELA */

    table {
        width: 100%;
        border-collapse: collapse;
    }

    th,
    td {
        border: 1px solid #ddd;
        padding: 8px;
        text-align: center;
    }

    th {
        background: #34495e;
        color: white;
    }

    .linha-emprestado {
        background-color: #ffe5e5;
    }

    .linha-emarquivo {
        background-color: #e5ffe5;
    }
</style>

</head>

<body>

    <div class="container">

        <div class="card">

            <div class="campo-direita">
                <input type="text" id="usuariologado" placeholder="Default" style="width:33%;">
            </div>

            <a href="PaginaPessoal.html" class="btn btn-default">
                <span class="glyphicon glyphicon-home"></span> Página Principal
            </a>

            <div class="logo">
                <h1><img src="Imagens/carlos1.gif" width="60">
                    Planilha de Projeto Eletrico</h1>
            </div>

            <div class="grid">

                <input type="text" id="id" placeholder="ID">

                <input type="text" id="projeto" placeholder="Projeto">

                <input type="text" id="circuito" placeholder="Circuito">

                <input type="text" id="descricao" placeholder="Descrição">

                <input type="text" id="potenciatotal" placeholder="Pot. Total(VA)">

                <input type="text" id="potenciacorrigida" placeholder="Pot. Corrigida(W)">

                <input type="text" id="tipocircuito" placeholder="Tipo Circuito">

                <input type="text" id="correnteIC" placeholder="CorrenteIC(A)">

                <input type="text" id="correnteIB" placeholder="CorrenteIB(A)">

                <input type="text" id="disjuntor" placeholder="Disjuntor(A)">

                <input type="text" id="condutor" placeholder="Condutor(mm2)">

            </div>

            <div class="botoes">

                <button id="salvar" onclick="salvar()">💾Salvar</button>
                <button id="editar" onclick="editar()">✏️Editar</button>
                <button id="deletar" onclick="deletar()">🗑️Deletar</button>
                <button id="limparCampos" onclick="limparCampos()">🧹Limpar</button>
                <button id="buscarArtista" onclick="buscarProjeto()">🔍BusProjeto</button>
                <button id="listarTodos" onclick="listarTodos()">📋LisProjeto</button>

            </div>

            <div class="login">

                <h2>Realizar Login</h2>

                <input type="text" id="usuario" placeholder="Usuario" style="width:33%;">

                <input type="password" id="senha" placeholder="Senha" style="width:33%;">

                <button onclick="autenticar()">🚪➡️Entrar</button>
                <button onclick="logout()">🚪⬅️Sair</button>

            </div>

        </div>

        <div class="card">

            <h2>Planilha de Projeto Eletrico</h2>

            <table>

                <thead>

                    <tr>

                        <th>ID</th>
                        <th>Circuito</th>
                        <th>Descrição</th>
                        <th>PotTotal</th>
                        <th>PotCorrigida</th>
                        <th>TipoCircuito</th>
                        <th>CorrenteIC</th>
                        <th>CorrenteIB</th>
                        <th>Disjuntor</th>
                        <th>Condutor</th>
                        <!--<th>Ação</th>-->

                    </tr>

                </thead>

                <tbody id="tabelaPlanilha">

                </tbody>

            </table>

        </div>

    </div>

    <script>


        const API = "https://projeto-springboot.onrender.com";

        //FUNÇÃO PARA INICIAR A JANELA (PAGINA)
        window.onload = function () {
            localStorage.removeItem("usuario");
            localStorage.removeItem("loggedIn");
        };

        function iniciarSistema() {
            console.log("Sistema iniciado");
        }

        //FUNÇÃO PARA INICIAR USUARIO
        function getUsuario() {

            const user = localStorage.getItem("usuario");

            if (!user || user === "undefined" || user === "null") {

                return null;
            }

            return user;
        }

        //FUNÇÃO PARA FECH SEGURO
        function fetchSeguro(url, options = {}) {
            return fetch(url, options); // ✔️ NÃO converte nada
        }


        //FUNÇÃO PARA LISTAR TODAS AS MIDIAS
        function listarTodos() {

            const usuario = getUsuario();

            if (!usuario) {
                console.warn("Usuário não definido!");
                alert("⚠️ Faça Login!");
                return;
            }

            fetchSeguro(`${API}/shows/usuario?usuario=${encodeURIComponent(usuario)}`)
                .then(response => {

                    console.log("Status:", response.status);

                    if (!response.ok) {
                        throw new Error(`Erro: ${response.status}`);
                    }

                    return response.json(); // 🔥 ESSA LINHA FALTAVA
                })
                .then(data => {

                    const tabela = document.getElementById("tabelaShows");

                    if (!Array.isArray(data)) {
                        console.error("Resposta inválida:", data);
                        tabela.innerHTML = "<tr><td colspan='7'>Erro ao carregar</td></tr>";
                        return;
                    }

                    let linhas = "";

                    data.forEach(show => {

                        // 🎨 Classe da linha
                        const classeLinha = show.situacao === "Emprestado"
                            ? "linha-emprestado"
                            : "linha-emarquivo";

                        // 🔘 Texto do botão
                        const textoBotao = show.situacao === "Emprestado"
                            ? "Devolver"
                            : "Emprestar";

                        linhas += `
                <tr class="${classeLinha}">
                    <td>${show.id ?? ""}</td>
                    <td>${show.codigo ?? ""}</td>
                    <td>${show.titulo ?? ""}</td>
                    <td>${show.artista ?? ""}</td>
                    <td>${show.situacao ?? ""}</td>
                    <td>${show.tipo ?? ""}</td>
                    <td>${show.genero ?? ""}</td>
                    <td>
                        <button onclick="editarSituacao(${show.id}, '${show.situacao}')">
                            ${textoBotao}
                        </button>
                    </td>
                </tr>`;
                    });

                    tabela.innerHTML = linhas;

                })
                .catch(err => {
                    console.error("Erro ao listar:", err);

                    const tabela = document.getElementById("tabelaShows");
                    if (tabela) {
                        tabela.innerHTML = "<tr><td colspan='8'>Erro ao carregar dados</td></tr>";
                    }
                });
        }


        //FUNÇÃO PARA EDITAR SITUAÇÃO
        function editarSituacao(id, situacaoAtual) {

            const novaSituacao = situacaoAtual === "Emprestado"
                ? "EmArquivo"
                : "Emprestado";

            fetch(`${API}/shows/${id}/situacao`, { // 🔥 mudou aqui
                method: "PUT",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    situacao: novaSituacao
                })
            })
                .then(response => {
                    if (!response.ok) {
                        throw new Error("Erro ao atualizar");
                    }
                    return response.text();
                })
                .then(() => {
                    listarTodos();
                })
                .catch(err => {
                    console.error("Erro ao atualizar:", err);
                    alert("Erro ao atualizar situação");
                });
        }

        // FUNÇÃO PARA SALVAR
        function salvar() {

            const usuario = getUsuario();

            if (!usuario) {
                console.warn("Usuário não definido!");
                alert("⚠️ Faça Login!");
                return;
            }

            if (!confirm("Tem certeza que deseja salvar esses dados?")) return;

            const codigo = document.getElementById("codigo")?.value.trim();
            const titulo = document.getElementById("titulo")?.value.trim();
            const artista = document.getElementById("artista")?.value.trim();
            const anodelancamento = document.getElementById("anodelancamento")?.value || null;
            const datadacompra = document.getElementById("datadacompra")?.value || null;
            const situacao = document.getElementById("situacao")?.value;
            const tipo = document.getElementById("tipo")?.value;
            const genero = document.getElementById("genero")?.value;
            usuario: usuario

            const dados = {
                codigo,
                titulo,
                artista,
                anodelancamento,
                datadacompra,
                situacao,
                tipo,
                genero,
                usuario // 🔥 vem do localStorage
            };

            fetchSeguro(`${API}/shows`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(dados)
            })
                .then(response => {
                    console.log("STATUS REAL:", response.status);

                    if (!response.ok) {
                        throw new Error(`Erro: ${response.status}`);
                    }

                    return response.json(); // ✔️ aqui sim
                })
                .then(data => {
                    console.log("Retorno correto:", data);

                    alert("✅ Dados salvos com sucesso!");
                    limparCampos();
                    listarTodos();
                })
                .catch(error => {
                    console.error("Erro ao salvar:", error);
                    alert("❌ Erro ao salvar dados");
                });
        }



        // FUNÇÃO PARA EDITAR
        function editar() {

            const usuario = getUsuario();

            if (!usuario) {
                console.warn("Usuário não definido!");
                alert("⚠️ Faça Login!");
                return;
            }

            const id = document.getElementById("id").value;

            if (!id) {
                alert("⚠️ ID inválido!");
                return;
            }

            if (!confirm("Tem certeza que deseja editar estes dados?")) return;

            const dados = {

                codigo: document.getElementById("codigo").value.trim(),
                titulo: document.getElementById("titulo").value.trim(),
                artista: document.getElementById("artista").value.trim(),
                anodelancamento: document.getElementById("anodelancamento").value || null,
                datadacompra: document.getElementById("datadacompra").value || null,
                situacao: document.getElementById("situacao").value,
                tipo: document.getElementById("tipo").value,
                genero: document.getElementById("genero").value,
                usuario: usuario // 🔥 importante se sua tabela usa isso
            };

            fetchSeguro(`${API}/shows/${id}`, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(dados)
            })

                .then(response => {
                    console.log("Status:", response.status);

                    if (!response.ok) {
                        throw new Error(`Erro ao atualizar: ${response.status}`);
                    }

                    return response.text(); // evita erro de JSON vazio
                })

                .then(() => {
                    alert("✅ Dados atualizados com sucesso!");

                    limparCampos();
                    listarTodos();
                })

                .catch(error => {
                    console.error("Erro ao editar:", error);
                    alert("❌ Erro ao atualizar dados");
                });
        }


        // FUNÇÃO PARA EXCLUIR
        function deletar(id) {

            const usuario = getUsuario();

            if (!usuario) {
                console.warn("Usuário não definido!");
                alert("⚠️ Faça Login!");
                return;
            }

            if (!id) {
                alert("⚠️ ID inválido!");
                return;
            }

            if (!confirm("Tem certeza que deseja excluir este registro?")) return;

            fetchSeguro(`${API}/shows/${id}`, {
                method: "DELETE"
            })
                .then(response => {
                    console.log("Status:", response.status);

                    if (!response.ok) {
                        throw new Error(`Erro ao excluir: ${response.status}`);
                    }

                    return response.text(); // evita erro se vier vazio
                })
                .then(() => {
                    alert("✅ Registro excluído com sucesso!");
                    listarTodos();
                })
                .catch(error => {
                    console.error("Erro ao excluir:", error);
                    alert("❌ Erro ao excluir o registro");
                });
        }


        // FUNÇÃO PARA BUSCAR ARTISTA
        function buscarArtista() {

            const usuario = getUsuario();

            if (!usuario) {
                alert("⚠️ Faça Login!");
                return;
            }

            const artista = document.getElementById("artista").value.trim();

            if (!artista) {
                alert("⚠️ Informe o artista a ser consultado!");
                return;
            }

            fetchSeguro(`${API}/shows/buscar?artista=${encodeURIComponent(artista)}`)
                .then(response => {

                    console.log("Status:", response.status);

                    if (!response.ok) {
                        throw new Error(`Erro: ${response.status}`);
                    }

                    return response.json(); // 🔥 ESSENCIAL
                })
                .then(data => {

                    const tabela = document.getElementById("tabelaShows");

                    if (!Array.isArray(data)) {
                        console.error("Resposta inválida:", data);
                        tabela.innerHTML = "<tr><td colspan='7'>Erro ao carregar</td></tr>";
                        return;
                    }

                    let linhas = "";

                    data.forEach(show => {

                        // 🎨 Classe da linha
                        const classeLinha = show.situacao === "Emprestado"
                            ? "linha-emprestado"
                            : "linha-emarquivo";

                        // 🔘 Texto do botão
                        const textoBotao = show.situacao === "Emprestado"
                            ? "Devolver"
                            : "Emprestar";

                        linhas += `
                    <tr>                        
                        <td>${show.id ?? ""}</td>
                        <td>${show.codigo ?? ""}</td>
                        <td>${show.titulo ?? ""}</td>
                        <td>${show.artista ?? ""}</td>
                        <td>${show.situacao ?? ""}</td>
                        <td>${show.tipo ?? ""}</td>
                        <td>${show.genero ?? ""}</td>
                        <td>
                            <button onclick="editarSituacao(${show.id}, '${show.situacao}')">
                                ${textoBotao}
                            </button>
                        </td>
                    </tr>
                `;
                    });

                    tabela.innerHTML = linhas;

                })
                .catch(error => {
                    console.error("Erro ao buscar artista:", error);

                    const tabela = document.getElementById("tabelaShows");
                    tabela.innerHTML = "<tr><td colspan='8'>Erro ao carregar dados</td></tr>";
                });
        }

        // FUNÇÃO PARA AUTENTICAR O USUARIO NO BANCO E MOSTRAR NA TELA
        function autenticar() {

            const usuario = document.getElementById("usuario").value;
            const senha = document.getElementById("senha").value;

            // Validação de campos vazios
            if (usuario === "" && senha === "") {
                alert("⚠️ Informe usuario e senha para realizar Login!");
                return;
            }

            if (usuario === "") {
                alert("⚠️ Informe o usuário!");
                return;
            }

            if (senha === "") {
                alert("⚠️ Informe a senha!");
                return;
            }

            fetch("https://projeto-springboot.onrender.com/usuario/login", {

                method: "POST",

                headers: {
                    "Content-Type": "application/json"
                },

                body: JSON.stringify({
                    usuario,
                    senha
                })

            })

                .then(response => {

                    if (!response.ok) {
                        throw new Error("Login inválido");
                    }

                    return response.json();

                })

                .then(data => {

                    // Mostra o usuário no campo Default
                    localStorage.setItem("usuario", data.usuario);
                    document.getElementById("usuariologado").value = data.usuario;
                    alert("Login realizado com sucesso!");
                    limparLogin();

                })


                .catch(error => {

                    alert("Usuário ou senha incorretos");

                });

        }


        // FUNÇÃO EFETUAR O LOGOUT
        function logout() {
            localStorage.removeItem("usuariologado");
            alert("🚪 Logout realizado com sucesso!");

            window.location.href = "GestãodeMidias.html";
        }

        // FUNÇÃO LIMPAR OS CAMPOS DO FORMULÁRIO
        function limparCampos() {
            document.getElementById("codigo").value = "";
            document.getElementById("titulo").value = "";
            document.getElementById("artista").value = "";
            document.getElementById("anodelançamento").value = "";
            document.getElementById("datadacompra").value = "";
            document.getElementById("situaçao").value = "";
            document.getElementById("tipo").value = "";
            document.getElementById("genero").value = "";
            //alert("Campos limpos sucesso!");

        }

        // FUNÇÃO PARA LIMPAR OS CAMPOS DO LOGIN
        function limparLogin() {
            document.getElementById("usuario").value = "";
            document.getElementById("senha").value = "";

        }

    </script>

</body>

</html>
